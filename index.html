<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="HK Tracker"/>

<title>HK Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0d0d1a;
  --bg2: #12121f;
  --card: #1a1a2e;
  --card2: #1f1f35;
  --border: #2a2a45;
  --border2: #353560;
  --blue: #4f8ef7;
  --blue2: #6fa3ff;
  --green: #2ecc8a;
  --red: #ff4f6d;
  --amber: #ffb03a;
  --purple: #9b7fe8;
  --text: #e8e8ff;
  --text2: #9494bb;
  --text3: #5a5a7a;
  --font: 'Outfit', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --radius: 14px;
  --radius-sm: 8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh;max-width:520px;margin:0 auto;position:relative}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:10}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.topbar-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.lang-btn{background:var(--card2);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-size:11px;font-weight:600;padding:4px 10px;cursor:pointer;font-family:var(--font);transition:all .15s}
.lang-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}

.tabs-bar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;flex-shrink:0}
.tab-btn{flex:1;padding:10px 4px;font-size:11px;font-weight:600;color:var(--text3);background:none;border:none;cursor:pointer;font-family:var(--font);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}

.content{flex:1;overflow-y:auto;padding:14px 16px 80px;-webkit-overflow-scrolling:touch}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card-title{font-size:15px;font-weight:700;margin-bottom:12px}

/* Form elements */
.field{margin-bottom:12px}
.field-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;display:block}
.field-input,.field-select{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:10px 12px;font-size:14px;font-family:var(--font);outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.field-input:focus,.field-select:focus{border-color:var(--blue)}
.field-input::placeholder{color:var(--text3)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid-4{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* Section divider */
.section-div{font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 10px;display:flex;align-items:center;gap:8px}
.section-div::after{content:'';flex:1;height:1px;background:var(--border)}

/* Variance preview box */
.var-preview{background:var(--card2);border-radius:var(--radius-sm);padding:10px 12px;margin:10px 0;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.var-item{display:flex;flex-direction:column;gap:2px}
.var-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.var-val{font-family:var(--mono);font-size:14px;font-weight:600}

/* Rating selector */
.rating-row{display:flex;gap:6px;margin-top:4px}
.rating-opt{flex:1;padding:8px 4px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:none;font-size:11px;font-weight:600;font-family:var(--font);cursor:pointer;text-align:center;transition:all .15s;color:var(--text2)}
.rating-opt.sat.selected{background:rgba(46,204,138,.15);border-color:var(--green);color:var(--green)}
.rating-opt.unsat.selected{background:rgba(255,79,109,.15);border-color:var(--red);color:var(--red)}
.rating-opt.train.selected{background:rgba(255,176,58,.15);border-color:var(--amber);color:var(--amber)}

/* Buttons */
.btn{width:100%;padding:13px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .15s}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff}
.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-secondary{background:none;border:1.5px solid var(--border);color:var(--text2);margin-top:8px}

/* Log cards */
.log-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.log-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.log-name{font-size:15px;font-weight:700}
.log-date{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.var-badge{font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;white-space:nowrap}
.stats-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.chip{background:var(--card2);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--text3);font-family:var(--mono);display:flex;flex-direction:column;gap:0}
.chip strong{font-size:13px;color:var(--text);display:block}
.time-row{background:var(--card2);border-radius:var(--radius-sm);padding:8px 10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.time-item{display:flex;flex-direction:column;gap:1px}
.time-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.time-val{font-family:var(--mono);font-size:12px;font-weight:600}
.arrow{color:var(--border2);font-size:14px}
.rooms-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.room-tag{background:var(--card2);border-radius:5px;padding:2px 7px;font-size:10px;font-family:var(--mono);color:var(--text3)}
.room-tag span{color:var(--text);font-weight:600}
.rating-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;margin-bottom:8px}
.card-actions{display:flex;gap:6px;padding-top:10px;border-top:1px solid var(--border)}
.act-btn{flex:1;padding:6px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid var(--border);background:none;color:var(--text3);font-family:var(--font);cursor:pointer}

/* Filter row */
.filter-row{display:flex;gap:8px;margin-bottom:12px}
.filter-row input,.filter-row select{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:8px 10px;font-size:13px;font-family:var(--font);outline:none;-webkit-appearance:none}
.filter-clear{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text3);padding:8px 10px;cursor:pointer;font-family:var(--font);font-size:12px}

/* Daily totals banner */
.daily-banner{background:linear-gradient(135deg,rgba(79,142,247,.1),rgba(155,127,232,.1));border:1px solid rgba(79,142,247,.25);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px}
.daily-banner-title{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.daily-banner-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.daily-stat{text-align:center}
.daily-stat-val{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--text)}
.daily-stat-lbl{font-size:9px;color:var(--text3);margin-top:1px;text-transform:uppercase;letter-spacing:.04em}

/* Analytics */
.range-pills{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);background:none;color:var(--text3);font-family:var(--font);cursor:pointer;transition:all .15s}
.pill.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;text-align:center}
.sum-val{font-size:20px;font-weight:800;font-family:var(--mono);color:var(--blue)}
.sum-lbl{font-size:9px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.staff-analytics-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.sa-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sa-name{font-size:14px;font-weight:700}
.sa-shifts{font-size:10px;color:var(--text3);font-family:var(--mono)}
.sa-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.sa-stat{text-align:center}
.sa-stat-val{font-family:var(--mono);font-size:14px;font-weight:600}
.sa-stat-lbl{font-size:9px;color:var(--text3);margin-top:1px}
.sa-breakdown{display:flex;gap:5px}
.sa-bd-item{flex:1;text-align:center;border-radius:6px;padding:4px;font-size:10px;font-weight:600}

/* Export button */
.export-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;background:var(--card2);border:1.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;margin-bottom:14px;transition:all .15s}
.export-btn:active{border-color:var(--blue);color:var(--blue)}

/* Settings */
.settings-section{margin-bottom:22px}
.settings-title{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.staff-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--card2);border-radius:var(--radius-sm);margin-bottom:6px}
.staff-item-name{font-weight:600;font-size:13px}
.staff-item-meta{font-size:10px;color:var(--text3);margin-top:1px}
.remove-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text3);padding:4px 9px;font-size:11px;cursor:pointer;font-family:var(--font)}
.add-row{display:flex;gap:8px;margin-top:10px}
.add-row input{flex:1;background:var(--card2);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:9px 12px;font-size:13px;font-family:var(--font);outline:none}
.add-row input:focus{border-color:var(--blue)}
.add-row-btn{background:linear-gradient(135deg,var(--blue),var(--purple));border:none;border-radius:var(--radius-sm);color:#fff;padding:9px 14px;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--font);white-space:nowrap}
.std-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--card2);border-radius:var(--radius-sm);margin-bottom:5px}
.std-lbl{font-size:12px;font-weight:600}
.std-val{font-family:var(--mono);font-size:12px;color:var(--blue)}

/* PIN overlay */
.pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.pin-box{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:28px 24px;width:280px;text-align:center}
.pin-title{font-size:16px;font-weight:700;margin-bottom:6px}
.pin-sub{font-size:12px;color:var(--text3);margin-bottom:18px}
.pin-input{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:12px;font-size:24px;font-family:var(--mono);text-align:center;letter-spacing:8px;outline:none;margin-bottom:12px}
.pin-input:focus{border-color:var(--blue)}
.pin-error{font-size:12px;color:var(--red);margin-bottom:10px;min-height:16px}
.pin-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--blue),var(--purple));border:none;border-radius:var(--radius-sm);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);margin-bottom:8px}
.pin-cancel{width:100%;padding:9px;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text3);font-size:13px;cursor:pointer;font-family:var(--font)}

/* Loader / Toast / Empty */
.loader{display:flex;align-items:center;justify-content:center;padding:50px;flex-direction:column;gap:12px;color:var(--text3);font-size:13px}
.spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:10px;font-size:12px;font-weight:600;z-index:300;white-space:nowrap;animation:slideUp .2s ease;pointer-events:none}
.toast.ok{background:#063a25;color:#4ade80;border:1px solid var(--green)}
.toast.err{background:#3a0614;color:#f87171;border:1px solid var(--red)}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:8px}
input[type=number]{-moz-appearance:textfield}

</style>

// ── Supabase ─────────────────────────────────────────────────────────────────
async function sb(path, opts={}){
  const url = path.startsWith('http') ? path : `${SB_URL}/rest/v1/${path}`;
  const res = await fetch(url, { ...opts, headers: {
    'apikey':SB_KEY, 'Authorization':`Bearer ${SB_KEY}`,
    'Content-Type':'application/json', 'Prefer':opts.prefer||'',
    ...(opts.headers||{})
  }});
  if(!res.ok){ const e=await res.text(); throw new Error(e); }
  if(res.status===204) return null;
  return res.json();
}

async function loadAll(){
  loading=true; render();
  try {
    const [recs, stf, tots] = await Promise.all([
      sb('housekeeping?order=date.desc,name.asc&select=*'),
      sb('staff?order=name.asc&select=*'),
      sb('daily_totals?select=*')
    ]);
    records = recs||[];
    staffList = (stf||[]).map(s=>s.name);
    dailyTotalsMap = {};
    (tots||[]).forEach(t=>{ dailyTotalsMap[t.date]=t; });
  } catch(e){ showToast('Connection error',false); }
  loading=false; render();
}

async function saveRecord(){
  if(!form.date||!form.name) return showToast(t('dateRequired'),false);
  if(!form.clock_out.trim()) return showToast(t('clockOutRequired'),false);
  try {
    if(editingId){

// ── Time math ────────────────────────────────────────────────────────────────
function toFrac(s){
  if(!s) return null;
  const m=s.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if(!m) return null;
  let h=+m[1],mn=+m[2];
  const ap=m[3].toUpperCase();
  if(ap==='PM'&&h!==12)h+=12;
  if(ap==='AM'&&h===12)h=0;
  return h+mn/60;
}
function toTime(f){
  f=((f%24)+24)%24;
  const h=Math.floor(f),m=Math.round((f-h)*60);
  const hh=m===60?h+1:h, mm=m===60?0:m;
  const s=hh>=12?'PM':'AM', dh=hh>12?hh-12:(hh===0?12:hh);
  return `${dh}:${String(mm).padStart(2,'0')} ${s}`;
}
function calcExpMin(r){
  return (r.k1kn_cosolc||0)*STD.k1kn_cosolc+(r.k1kn_so||0)*STD.k1kn_so
        +(r.k2qn_cosolc||0)*STD.k2qn_cosolc+(r.k2qn_so||0)*STD.k2qn_so
        +(r.o1kn_cosolc||0)*STD.o1kn_cosolc+(r.o1kn_so||0)*STD.o1kn_so
        +(r.bad_rooms||0)*STD.bad_rooms+(r.deep_cleans||0)*STD.deep_cleans+STD.overhead;
}
function calcVar(r){
  const sf=toFrac(r.clock_in||r.start_time),cf=toFrac(r.clock_out);
  if(sf===null||cf===null) return null;
  const expMin=calcExpMin(r);
  const actMin=Math.round((cf-sf)*60);
  return {expMin, expEnd:toTime(sf+expMin/60), actMin, varMin:actMin-expMin};
}
function totalRooms(r){
  return (r.k1kn_cosolc||0)+(r.k1kn_so||0)+(r.k2qn_cosolc||0)+(r.k2qn_so||0)+(r.o1kn_cosolc||0)+(r.o1kn_so||0);
}
function vcol(m){ return m>10?'var(--red)':m<-10?'var(--green)':'var(--amber)'; }
function vlab(m){ if(m===null||m===undefined) return '—'; return (m>=0?'+':'')+m+' min'; }
function fmtDate(d){ return new Date(d+'T00:00:00').toLocaleDateString(lang==='es'?'es-US':'en-US',{weekday:'short',month:'short',day:'numeric'}); }

function showToast(msg,ok=true){

// ── Helpers ──────────────────────────────────────────────────────────────────
function ratingColor(r){
  if(r==='Satisfactory'||r==='Satisfactorio') return {bg:'rgba(46,204,138,.15)',c:'var(--green)'};
  if(r==='Unsatisfactory'||r==='Insatisfactorio') return {bg:'rgba(255,79,109,.15)',c:'var(--red)'};
  if(r) return {bg:'rgba(255,176,58,.15)',c:'var(--amber)'};
  return null;
}
function ratingLabel(r){
  if(!r) return '';
  if(lang==='es'){
    if(r==='Satisfactory') return 'Satisfactorio';
    if(r==='Unsatisfactory') return 'Insatisfactorio';
    if(r==='Needs Training') return 'Necesita Capacitación';
  }
  return r;
}
function badgeBg(col){
  const map={'var(--red)':'rgba(255,79,109,.15)','var(--green)':'rgba(46,204,138,.15)','var(--amber)':'rgba(255,176,58,.15)','var(--muted)':'rgba(90,90,122,.15)'};
  return map[col]||'rgba(90,90,122,.15)';
}

// ── Export ───────────────────────────────────────────────────────────────────
function exportCSV(rows, filename){
  if(!rows.length) return showToast('No data to export',false);
  const headers = ['Date','Name','K1KN CO/SOLC','K1KN SO','K2QN CO/SOLC','K2QN SO','O1KN CO/SOLC','O1KN SO','Bad Rooms','Deep Cleans','Clock In','Clock Out','Exp Min','Act Min','Variance Min','Rating'];
  const lines = [headers.join(',')];
  rows.forEach(r=>{
    const v=calcVar(r);
    lines.push([
      r.date, r.name,
      r.k1kn_cosolc||0, r.k1kn_so||0, r.k2qn_cosolc||0, r.k2qn_so||0,
      r.o1kn_cosolc||0, r.o1kn_so||0, r.bad_rooms||0, r.deep_cleans||0,
      r.clock_in||'', r.clock_out||'',
      v?v.expMin:'', v?v.actMin:'', v?v.varMin:'',
      r.rating||''
    ].join(','));
  });
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=filename; a.click();
}

function exportDay(){
  const dateToExport = filterDate || new Date().toISOString().slice(0,10);
  const rows = records.filter(r=>r.date===dateToExport);
  exportCSV(rows, `hk-${dateToExport}.csv`);
}

function exportAll(){

}

      <button class="btn btn-secondary" onclick="cancelEdit()">${t('cancel')}</button>
    </div>
  </div>`;
}

function setRating(r){
  form.rating=form.rating===r?'':r;
  // re-render just the rating buttons
  document.querySelectorAll('.rating-opt').forEach(b=>{
    b.classList.remove('selected');
    if((b.classList.contains('sat')&&r==='Satisfactory'&&form.rating===r)||
       (b.classList.contains('unsat')&&r==='Unsatisfactory'&&form.rating===r)||
       (b.classList.contains('train')&&r==='Needs Training'&&form.rating===r)) b.classList.add('selected');
  });
}

function updateVarPreview(){
  const expMin=calcExpMin(form);
  const sf=toFrac(form.clock_in);
  const expEnd=sf!==null?toTime(sf+expMin/60):'—';
  const v=calcVar(form);
  const col=v?vcol(v.varMin):'var(--text3)';
  const vMin=document.getElementById('vMin'),vEnd=document.getElementById('vEnd'),vVar=document.getElementById('vVar');
  if(vMin) vMin.textContent=expMin;
  if(vEnd) vEnd.textContent=expEnd;
  if(vVar){ vVar.textContent=v?vlab(v.varMin):'—'; vVar.style.color=col; }
}

// ── ANALYTICS ─────────────────────────────────────────────────────────────────
function renderAnalytics(el){
  const today=new Date().toISOString().slice(0,10);
  const rf=records.filter(r=>{
    const diff=(new Date(today)-new Date(r.date+'T00:00:00'))/86400000;
    if(analyticsRange==='day') return r.date===today;
    if(analyticsRange==='week') return diff>=0&&diff<7;
    if(analyticsRange==='month') return r.date.slice(0,7)===today.slice(0,7);
    return true;
  });
  const withV=rf.map(r=>({...r,_v:calcVar(r)})).filter(r=>r._v);
  const avgVar=withV.length?Math.round(withV.reduce((s,r)=>s+r._v.varMin,0)/withV.length):0;
  const names=[...new Set(rf.map(r=>r.name))].sort();

  let html=`<div class="range-pills">
    ${[['day',t('today')],['week',t('last7')],['month',t('thisMonth')],['all',t('allTime')]].map(([v,l])=>
      `<button class="pill ${analyticsRange===v?'active':''}" onclick="analyticsRange='${v}';render()">${l}</button>`).join('')}
  </div>
  <div class="summary-grid">
    <div class="sum-card"><div class="sum-val">${rf.length}</div><div class="sum-lbl">${t('shifts')}</div></div>
    <div class="sum-card"><div class="sum-val">${rf.reduce((s,r)=>s+totalRooms(r),0)}</div><div class="sum-lbl">${t('rooms')}</div></div>
    <div class="sum-card"><div class="sum-val" style="color:${vcol(avgVar)}">${avgVar>0?'+':''}${avgVar}m</div><div class="sum-lbl">${t('avgVariance')}</div></div>
  </div>
  <button class="export-btn" onclick="exportDay()">${t('exportDay')}</button>
  <button class="export-btn" onclick="exportAll()" style="margin-bottom:14px">${t('exportAll')}</button>
  <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">${t('staffPerformance')}</div>`;

  if(!names.length){ html+=`<div class="empty"><div class="empty-icon">📊</div>${t('noData')}</div>`; }
  else names.forEach(name=>{
    const rows=rf.filter(r=>r.name===name);
    const rowsV=rows.map(r=>({...r,_v:calcVar(r)})).filter(r=>r._v);
    const avgRooms=(rows.reduce((s,r)=>s+totalRooms(r),0)/rows.length).toFixed(1);
    const avgExpMin=rowsV.length?Math.round(rowsV.reduce((s,r)=>s+r._v.expMin,0)/rowsV.length):'-';
    const avgVarMin=rowsV.length?Math.round(rowsV.reduce((s,r)=>s+r._v.varMin,0)/rowsV.length):null;
    const col=avgVarMin!==null?vcol(avgVarMin):'var(--text3)';
    const over=rowsV.filter(r=>r._v.varMin>10).length;
    const under=rowsV.filter(r=>r._v.varMin<-10).length;
    const ontime=rowsV.length-over-under;
    // Rating breakdown
    const satCount=rows.filter(r=>r.rating==='Satisfactory').length;
    const unsatCount=rows.filter(r=>r.rating==='Unsatisfactory').length;
    const trainCount=rows.filter(r=>r.rating==='Needs Training').length;
    html+=`<div class="staff-analytics-card">
      <div class="sa-header">
        <div class="sa-name">${name}</div>
        <span class="sa-shifts">${rows.length} shift${rows.length!==1?'s':''}</span>
      </div>
      <div class="sa-stats">
        <div class="sa-stat"><div class="sa-stat-val">${avgRooms}</div><div class="sa-stat-lbl">${t('avgRooms')}</div></div>
        <div class="sa-stat"><div class="sa-stat-val">${avgExpMin}</div><div class="sa-stat-lbl">${t('expMin')}</div></div>
        <div class="sa-stat"><div class="sa-stat-val" style="color:${col}">${avgVarMin!==null?(avgVarMin>0?'+':'')+avgVarMin+'m':'—'}</div><div class="sa-stat-lbl">${t('avgVariance')}</div></div>
      </div>
      ${rowsV.length?`<div class="sa-breakdown" style="margin-bottom:6px">
        <div class="sa-bd-item" style="background:rgba(46,204,138,.1);color:var(--green)">✓ ${ontime} ${t('onTime')}</div>
        <div class="sa-bd-item" style="background:rgba(255,79,109,.1);color:var(--red)">↑ ${over} ${t('over')}</div>
        <div class="sa-bd-item" style="background:rgba(79,142,247,.1);color:var(--blue)">↓ ${under} ${t('early')}</div>
      </div>`:''}
      ${rows.length?`<div class="sa-breakdown">
        <div class="sa-bd-item" style="background:rgba(46,204,138,.1);color:var(--green)">${satCount} ${t('sat')}</div>
        <div class="sa-bd-item" style="background:rgba(255,79,109,.1);color:var(--red)">${unsatCount} ${t('unsat')}</div>
        <div class="sa-bd-item" style="background:rgba(255,176,58,.1);color:var(--amber)">${trainCount} ${t('train')}</div>
      </div>`:''}
    </div>`;
  });
  el.innerHTML=html;
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function renderSettings(el){
  el.innerHTML=`
  <div class="settings-section">
    <div class="settings-title">${t('staffList')}</div>
    ${staffList.length===0?`<div style="color:var(--text3);font-size:12px;padding:8px 0">${t('noStaff')}</div>`:''}
    ${staffList.map(name=>{
      const shifts=records.filter(r=>r.name===name).length;
      return `<div class="staff-item">
        <div><div class="staff-item-name">${name}</div><div class="staff-item-meta">${shifts} shift${shifts!==1?'s':''}</div></div>
        <button class="remove-btn" onclick="removeStaff('${name}')">${t('removeStaff')}</button>
      </div>`;
    }).join('')}
    <div class="add-row">
      <input id="nsi" placeholder="${t('addName')}" value="${newStaffName}"
        oninput="newStaffName=this.value" onkeydown="if(event.key==='Enter')addStaff()"/>
      <button class="add-row-btn" onclick="addStaff()">${t('add')}</button>
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-title">${t('timeStandards')}</div>
    ${[
      ['K1KN CO/SOLC', STD.k1kn_cosolc],['K1KN SO', STD.k1kn_so],
      ['K2QN CO/SOLC', STD.k2qn_cosolc],['K2QN SO', STD.k2qn_so],
      ['O1KN CO/SOLC', STD.o1kn_cosolc],['O1KN SO', STD.o1kn_so],
      ['Bad Room', STD.bad_rooms],['Deep Clean', STD.deep_cleans],
      [t('overhead'), STD.overhead]
    ].map(([l,v])=>`<div class="std-row"><span class="std-lbl">${l}</span><span class="std-val">${v} min</span></div>`).join('')}
    <div style="font-size:11px;color:var(--text3);margin-top:8px;padding:8px 10px;background:var(--card2);border-radius:6px">
      ${lang==='es'?'Los estándares de tiempo solo pueden ser modificados por el propietario.':'Time standards can only be modified by the owner.'}
    </div>
  </div>
  <div style="padding:10px 0">
    <button onclick="settingsUnlocked=false;switchTab('log')" style="background:none;border:1px solid var(--border);border-radius:8px;color:var(--text3);padding:8px 14px;font-size:12px;cursor:pointer;font-family:var(--font);width:100%">
      ${lang==='es'?'🔒 Cerrar Configuración':'🔒 Lock Settings'}
    </button>
  </div>`;
}

// ── Edit helpers ──────────────────────────────────────────────────────────────
function startEdit(id){
  const r=records.find(x=>x.id===id); if(!r) return;
  editingId=id; form={...r, clock_in: r.clock_in||r.start_time||'8:30 AM'};
  switchTab('entry');
}
function cancelEdit(){ editingId=null; form=emptyForm(); switchTab('log'); }

// ── Boot ──────────────────────────────────────────────────────────────────────
updateTabLabels();
loadAll();
</script>
</body>
</html>
